name: Build Single Container

on:
  workflow_dispatch:
    inputs:
      container:
        description: "Container to build and deploy"
        required: true
        type: choice
        options:
          - web
          - trainer-panel
          - admin-panel
          - api
          - worker
          - bull-board
          - prisma
      deploy:
        description: "Deploy to server after build"
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: asmtv1

jobs:
  # Подготовка зависимостей
  prepare-deps:
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
      pnpm-cache-key: ${{ steps.pnpm-cache-key.outputs.key }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate cache keys
        id: cache-key
        run: |
          echo "key=${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('packages/**/src/**', 'apps/**/src/**') }}" >> $GITHUB_OUTPUT

      - name: Generate pnpm cache key
        id: pnpm-cache-key
        run: echo "key=${{ hashFiles('**/pnpm-lock.yaml') }}-pnpm-store" >> $GITHUB_OUTPUT

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ steps.pnpm-cache-key.outputs.key }}
          restore-keys: |
            ${{ hashFiles('**/pnpm-lock.yaml') }}-pnpm-store

      - name: Install dependencies
        run: |
          pnpm config set store-dir ~/.pnpm-store
          pnpm config set verify-store-integrity false
          pnpm config set auto-install-peers true
          pnpm config set dedupe-peer-dependents false
          pnpm install --frozen-lockfile --prefer-offline

      - name: Generate Prisma Client
        run: |
          cd packages/prisma
          cp schema.prisma schema.prisma.bak
          awk 'BEGIN{skip=0} /^generator erd \{/{skip=1} skip && /^\}/{skip=0; next} !skip {print}' schema.prisma > schema.tmp && mv schema.tmp schema.prisma
          pnpm db:generate
          mv schema.prisma.bak schema.prisma

      - name: Build packages
        run: |
          # Сначала собираем logger и prisma напрямую (без turbo) из-за циклической зависимости
          # logger использует prisma динамически, но TypeScript проверяет типы при компиляции
          # Собираем logger первым, так как prisma зависит от него статически
          cd packages/logger && pnpm build && cd ../..
          # После сборки logger, собираем пакеты, зависящие только от logger
          cd packages/types && pnpm build && cd ../..
          cd packages/queues && pnpm build && cd ../..
          cd packages/cdn-upload && pnpm build && cd ../..
          # Собираем prisma (зависит от logger)
          cd packages/prisma && pnpm build && cd ../..
          # Собираем auth (зависит от logger и prisma)
          cd packages/auth && pnpm build && cd ../..
          # Собираем video-access (core зависит от него)
          cd packages/video-access && pnpm build && cd ../..
          # Собираем core после всех зависимостей (зависит от prisma, logger, types, queues, cdn-upload, auth, video-access)
          cd packages/core && pnpm build && cd ../..
          # Затем собираем остальные пакеты через turbo (мы уже в корневой директории)
          pnpm build --filter=@gafus/* --filter=!@gafus/prisma --filter=!@gafus/logger --filter=!@gafus/core --filter=!@gafus/types --filter=!@gafus/queues --filter=!@gafus/cdn-upload --filter=!@gafus/auth --filter=!@gafus/video-access

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/dist
            packages/*/.prisma
            ~/.pnpm-store
          key: ${{ steps.cache-key.outputs.key }}-deps
          restore-keys: |
            ${{ hashFiles('**/pnpm-lock.yaml') }}-deps

  # Определение конфигурации контейнера
  set-container-config:
    runs-on: ubuntu-latest
    outputs:
      dockerfile: ${{ steps.config.outputs.dockerfile }}
      tag: ${{ steps.config.outputs.tag }}
      app-name: ${{ steps.config.outputs.app-name }}
    steps:
      - name: Set container configuration
        id: config
        run: |
          case "${{ github.event.inputs.container }}" in
            web)
              echo "dockerfile=Dockerfile-web-optimized" >> $GITHUB_OUTPUT
              echo "tag=gafus-web" >> $GITHUB_OUTPUT
              echo "app-name=web" >> $GITHUB_OUTPUT
              ;;
            trainer-panel)
              echo "dockerfile=Dockerfile-trainer-panel-optimized" >> $GITHUB_OUTPUT
              echo "tag=gafus-trainer-panel" >> $GITHUB_OUTPUT
              echo "app-name=trainer-panel" >> $GITHUB_OUTPUT
              ;;
            admin-panel)
              echo "dockerfile=Dockerfile-admin-panel-optimized" >> $GITHUB_OUTPUT
              echo "tag=gafus-admin-panel" >> $GITHUB_OUTPUT
              echo "app-name=admin-panel" >> $GITHUB_OUTPUT
              ;;
            api)
              echo "dockerfile=Dockerfile-api-optimized" >> $GITHUB_OUTPUT
              echo "tag=gafus-api" >> $GITHUB_OUTPUT
              echo "app-name=api" >> $GITHUB_OUTPUT
              ;;
            worker)
              echo "dockerfile=Dockerfile-worker-optimized" >> $GITHUB_OUTPUT
              echo "tag=gafus-worker" >> $GITHUB_OUTPUT
              echo "app-name=worker" >> $GITHUB_OUTPUT
              ;;
            bull-board)
              echo "dockerfile=Dockerfile-bull-board-optimized" >> $GITHUB_OUTPUT
              echo "tag=gafus-bull-board" >> $GITHUB_OUTPUT
              echo "app-name=bull-board" >> $GITHUB_OUTPUT
              ;;
            prisma)
              echo "dockerfile=Dockerfile-prisma-optimized" >> $GITHUB_OUTPUT
              echo "tag=gafus-prisma" >> $GITHUB_OUTPUT
              echo "app-name=prisma" >> $GITHUB_OUTPUT
              ;;
          esac

  # Сборка приложения (если это Next.js приложение или API)
  build-app:
    needs: [prepare-deps, set-container-config]
    if: |
      github.event.inputs.container == 'web' ||
      github.event.inputs.container == 'trainer-panel' ||
      github.event.inputs.container == 'admin-panel' ||
      github.event.inputs.container == 'api'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/dist
            packages/*/.prisma
            ~/.pnpm-store
          key: ${{ needs.prepare-deps.outputs.cache-key }}-deps

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ needs.prepare-deps.outputs.pnpm-cache-key }}
          restore-keys: |
            ${{ hashFiles('**/pnpm-lock.yaml') }}-pnpm-store

      - name: Install dependencies
        run: |
          pnpm config set store-dir ~/.pnpm-store
          pnpm config set verify-store-integrity false
          pnpm config set auto-install-peers true
          pnpm config set dedupe-peer-dependents false
          pnpm install --frozen-lockfile --prefer-offline --offline

      - name: Build ${{ needs.set-container-config.outputs.app-name }}
        run: |
          if [ "${{ needs.set-container-config.outputs.app-name }}" = "api" ]; then
            # API собирается через turbo с фильтрами
            pnpm build --filter @gafus/api
          else
            # Next.js приложения собираются напрямую
            cd apps/${{ needs.set-container-config.outputs.app-name }}
            pnpm build
          fi

      - name: Cache app build
        uses: actions/cache@v4
        with:
          path: |
            apps/${{ needs.set-container-config.outputs.app-name }}/.next
            apps/${{ needs.set-container-config.outputs.app-name }}/dist
          key: ${{ needs.prepare-deps.outputs.cache-key }}-${{ needs.set-container-config.outputs.app-name }}-build

  # Подготовка Docker окружения
  prepare-docker:
    needs: [prepare-deps, set-container-config]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

  # Сборка и пуш Docker образа
  build-and-push:
    needs: [prepare-docker, set-container-config]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push ${{ needs.set-container-config.outputs.tag }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ci-cd/docker/${{ needs.set-container-config.outputs.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ needs.set-container-config.outputs.tag }}:latest
          # web — без кэша, чтобы pnpm build брал актуальный код (фикс updateStepAndDay на проде)
          no-cache: ${{ github.event.inputs.container == 'web' }}
          cache-from: |
            type=gha
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/gafus-base:latest
          cache-to: |
            type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  # Деплой на сервер (опционально)
  deploy:
    needs: [build-and-push, set-container-config]
    if: github.event.inputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy ${{ needs.set-container-config.outputs.tag }} to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.GAFUS_SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 30m
          script: |
            set -e
            echo "🚀 Deploying ${{ needs.set-container-config.outputs.tag }} to production..."

            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              echo "🐳 Installing Docker..."
              apt-get update
              apt-get install -y apt-transport-https ca-certificates gnupg lsb-release curl
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
              echo "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu focal stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
              apt-get update
              apt-get install -y docker-ce docker-ce-cli containerd.io
              systemctl start docker
              systemctl enable docker
            fi

            # Install Docker Compose if not present
            if ! command -v docker-compose &> /dev/null; then
              echo "🐳 Installing Docker Compose..."
              curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              chmod +x /usr/local/bin/docker-compose
            fi

            # Login to GitHub Container Registry
            echo "🔐 Logging in to GitHub Container Registry..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u asmtv1 --password-stdin

            # Navigate to project directory
            cd /root/gafus || {
              echo "Directory /root/gafus not found, creating it..."
              mkdir -p /root/gafus
              cd /root/gafus
            }

            # Check if .env file exists, create if not
            if [ ! -f ci-cd/docker/.env ]; then
              echo "⚠️ .env file not found, creating from GitHub Secrets..."
              {
                echo "# Database"
                echo "POSTGRES_DB=gafus"
                echo "POSTGRES_USER=gafus"
                echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
                echo "DATABASE_URL=postgresql://gafus:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/gafus"
                echo ""
                echo "# Redis"
                echo "REDIS_URL=redis://redis:6379"
                echo ""
                echo "# NextAuth секреты"
                echo "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}"
                echo ""
                echo "# JWT секреты для API"
                echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
                echo "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}"
                echo ""
                echo "# URLs приложений"
                echo "NEXTAUTH_URL=https://gafus.ru"
                echo "TRAINER_PANEL_URL=https://trainer-panel.gafus.ru"
                echo "NEXT_PUBLIC_TRACER_APP_TOKEN=${{ secrets.NEXT_PUBLIC_TRACER_APP_TOKEN }}"
                echo "NEXT_PUBLIC_APP_VERSION=1.0.0"
                echo "NEXT_PUBLIC_ENABLE_TRACER=true"
                echo "WEB_APP_URL=https://gafus.ru"
                echo ""
                echo "# Cookie домен"
                echo "AUTH_COOKIE_DOMAIN=.gafus.ru"
                echo ""
                echo "# VAPID ключи для Push уведомлений"
                echo "VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }}"
                echo "VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}"
                echo "VAPID_SUBJECT=mailto:admin@gafus.ru"
                echo ""
                echo "# Yandex Cloud CDN"
                echo "YC_ACCESS_KEY_ID=${{ secrets.YC_ACCESS_KEY_ID }}"
                echo "YC_SECRET_ACCESS_KEY=${{ secrets.YC_SECRET_ACCESS_KEY }}"
                echo ""
                echo "# Защита видео (HLS) - обязательно для API"
                echo "VIDEO_ACCESS_SECRET=${{ secrets.VIDEO_ACCESS_SECRET }}"
                echo "NEXT_PUBLIC_ENABLE_HLS_PROTECTION=${{ secrets.NEXT_PUBLIC_ENABLE_HLS_PROTECTION || 'true' }}"
                echo ""
                echo "# Логирование"
                echo "DISABLE_CONSOLE_LOGGING=true"
                echo ""
                echo "# Next.js публичные переменные"
                echo "NEXT_PUBLIC_SITE_URL=https://gafus.ru"
                echo "NEXT_PUBLIC_TRAINER_PANEL_URL=https://trainer.gafus.ru"
                echo "NEXT_PUBLIC_APP_URL=https://trainer.gafus.ru"
                echo ""
                echo "# Анализ бандла (только для разработки)"
                echo "ANALYZE=false"
                echo ""
                echo "# CSRF защита"
                echo "CSRF_STRICT=false"
                echo ""
                echo "# Grafana"
                echo "GRAFANA_ADMIN_USER=${{ secrets.GRAFANA_ADMIN_USER }}"
                echo "GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}"
                echo "GRAFANA_SECRET_KEY=${{ secrets.GRAFANA_SECRET_KEY }}"
                echo ""
                echo "# OpenRouter AI API"
                echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}"
                echo ""
                echo "# ЮKassa (платные курсы)"
                echo "YOOKASSA_SHOP_ID=${{ secrets.YOOKASSA_SHOP_ID }}"
                echo "YOOKASSA_SECRET_KEY=${{ secrets.YOOKASSA_SECRET_KEY }}"
                echo ""
                echo "# Реквизиты для ЮKassa (контакты на сайте)"
                echo "NEXT_PUBLIC_CONTACT_EMAIL=${{ secrets.NEXT_PUBLIC_CONTACT_EMAIL }}"
                echo "NEXT_PUBLIC_CONTACT_PHONE=${{ secrets.NEXT_PUBLIC_CONTACT_PHONE }}"
                echo "NEXT_PUBLIC_CONTACT_FIO=${{ secrets.NEXT_PUBLIC_CONTACT_FIO }}"
                echo "NEXT_PUBLIC_CONTACT_INN=${{ secrets.NEXT_PUBLIC_CONTACT_INN }}"
                echo ""
                echo "# VK ID авторизация"
                echo "VK_CLIENT_ID=${{ secrets.VK_CLIENT_ID }}"
                echo "VK_CLIENT_ID_IOS=${{ secrets.VK_CLIENT_ID_IOS }}"
                echo "VK_CLIENT_ID_ANDROID=${{ secrets.VK_CLIENT_ID_ANDROID }}"
                echo "VK_WEB_REDIRECT_URI=${{ vars.VK_WEB_REDIRECT_URI || 'https://gafus.ru/api/auth/callback/vk-id' }}"
                echo "VK_MOBILE_REDIRECT_URI=${{ vars.VK_MOBILE_REDIRECT_URI || 'gafus://auth/vk' }}"
              } > ci-cd/docker/.env
              chmod 600 ci-cd/docker/.env
              echo "✅ .env file created"
            else
              echo "✅ .env file exists"
              # Обновляем VIDEO_ACCESS_SECRET, если его нет или он пустой
              VIDEO_SECRET="${{ secrets.VIDEO_ACCESS_SECRET }}"
              if ! grep -q "^VIDEO_ACCESS_SECRET=" ci-cd/docker/.env || grep -q "^VIDEO_ACCESS_SECRET=$" ci-cd/docker/.env; then
                echo "🔄 Updating VIDEO_ACCESS_SECRET in existing .env file..."
                if grep -q "^# Защита видео" ci-cd/docker/.env; then
                  # Заменяем существующую строку VIDEO_ACCESS_SECRET
                  sed -i "s|^VIDEO_ACCESS_SECRET=.*|VIDEO_ACCESS_SECRET=${VIDEO_SECRET}|" ci-cd/docker/.env
                else
                  # Добавляем секцию, если её нет
                  echo "" >> ci-cd/docker/.env
                  echo "# Защита видео (HLS) - обязательно для API" >> ci-cd/docker/.env
                  echo "VIDEO_ACCESS_SECRET=${VIDEO_SECRET}" >> ci-cd/docker/.env
                fi
                echo "✅ VIDEO_ACCESS_SECRET updated"
              fi

              # Обновляем/добавляем env для платежей API
              if ! grep -q "^YOOKASSA_SHOP_ID=" ci-cd/docker/.env; then
                echo "YOOKASSA_SHOP_ID=${{ secrets.YOOKASSA_SHOP_ID }}" >> ci-cd/docker/.env
              fi
              if ! grep -q "^YOOKASSA_SECRET_KEY=" ci-cd/docker/.env; then
                echo "YOOKASSA_SECRET_KEY=${{ secrets.YOOKASSA_SECRET_KEY }}" >> ci-cd/docker/.env
              fi
              if ! grep -q "^WEB_APP_URL=" ci-cd/docker/.env; then
                echo "WEB_APP_URL=https://gafus.ru" >> ci-cd/docker/.env
              fi
            fi

            # Pull latest image
            echo "📥 Pulling latest ${{ needs.set-container-config.outputs.tag }} image..."
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ needs.set-container-config.outputs.tag }}:latest

            # Restart specific container
            echo "🔄 Restarting ${{ needs.set-container-config.outputs.tag }} container..."
            docker-compose -f ci-cd/docker/docker-compose.prod.yml up -d --force-recreate --no-deps ${{ github.event.inputs.container }} || {
              echo "⚠️ Container restart failed, trying to start it..."
              docker-compose -f ci-cd/docker/docker-compose.prod.yml up -d ${{ github.event.inputs.container }}
            }

            # Wait for container to be ready
            echo "⏳ Waiting for container to be ready..."
            sleep 10

            # Check container status
            if docker ps | grep -q "gafus-${{ github.event.inputs.container }}"; then
              echo "✅ Container ${{ needs.set-container-config.outputs.tag }} deployed successfully!"
              docker ps | grep "gafus-${{ github.event.inputs.container }}"
            else
              echo "❌ Container ${{ needs.set-container-config.outputs.tag }} failed to start"
              docker logs gafus-${{ github.event.inputs.container }} || echo "Could not fetch logs"
              exit 1
            fi

            # Cleanup old images
            docker image prune -f || true
