name: Deploy Only

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 60m
          script: |
            set -e
            echo "🚀 Starting deployment to ${{ github.event.inputs.environment }}..."

            # Install basic tools first
            echo "🔧 Installing basic tools..."
            apt-get update
            apt-get install -y curl wget

            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              echo "🐳 Installing Docker..."
              # Use apt for Ubuntu 20.04 (focal)
              apt-get install -y apt-transport-https ca-certificates gnupg lsb-release
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
              echo "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu focal stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
              apt-get update
              apt-get install -y docker-ce docker-ce-cli containerd.io
              systemctl start docker
              systemctl enable docker
            fi

            # Install Docker Compose if not present
            if ! command -v docker-compose &> /dev/null; then
              echo "🐳 Installing Docker Compose..."
              curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              chmod +x /usr/local/bin/docker-compose
            fi

            # Login to GitHub Container Registry
            echo "🔐 Logging in to GitHub Container Registry..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u asmtv1 --password-stdin

            # Navigate to project directory
            cd /root/gafus || {
              echo "Directory /root/gafus not found, creating it..."
              mkdir -p /root/gafus
              cd /root/gafus
            }

            # Initialize git repository if it doesn't exist
            if [ ! -d .git ]; then
              echo "Git repository not found, initializing..."
              git init
              git remote add origin https://${{ secrets.GH_PAT }}@github.com/asmtv1/gafus.git
            fi

            # Ensure we have the correct remote
            git remote set-url origin https://${{ secrets.GH_PAT }}@github.com/asmtv1/gafus.git

            # Pull latest changes
            git pull origin main

            # Create .env file from GitHub Secrets
            echo "🔐 Creating .env file from GitHub Secrets..."
            {
              echo "# Database"
              echo "POSTGRES_DB=gafus"
              echo "POSTGRES_USER=gafus"
              echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
              echo "DATABASE_URL=postgresql://gafus:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/gafus"
              echo ""
              echo "# Redis"
              echo "REDIS_URL=redis://redis:6379"
              echo ""
              echo "# Telegram Bot"
              echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}"
              echo ""
              echo "# NextAuth секреты"
              echo "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}"
              echo ""
              echo "# JWT секреты для API"
              echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
              echo "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}"
              echo ""
              echo "# URLs приложений"
              echo "NEXTAUTH_URL=https://gafus.ru"
              echo "TRAINER_PANEL_URL=https://trainer-panel.gafus.ru"
              echo "NEXT_PUBLIC_TRACER_APP_TOKEN=${{ secrets.NEXT_PUBLIC_TRACER_APP_TOKEN }}"
              echo "NEXT_PUBLIC_APP_VERSION=1.0.0"
              echo "NEXT_PUBLIC_ENABLE_TRACER=true"
              echo "WEB_APP_URL=https://gafus.ru"
              echo ""
              echo "# Cookie домен"
              echo "AUTH_COOKIE_DOMAIN=.gafus.ru"
              echo ""
              echo "# VAPID ключи для Push уведомлений"
              echo "VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }}"
              echo "VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}"
              echo "VAPID_SUBJECT=mailto:admin@gafus.ru"
              echo ""
              echo "# Yandex Cloud CDN"
              echo "YC_ACCESS_KEY_ID=${{ secrets.YC_ACCESS_KEY_ID }}"
              echo "YC_SECRET_ACCESS_KEY=${{ secrets.YC_SECRET_ACCESS_KEY }}"
              echo ""
              echo "# Защита видео (HLS)"
              echo "VIDEO_ACCESS_SECRET=${{ secrets.VIDEO_ACCESS_SECRET }}"
              echo "NEXT_PUBLIC_ENABLE_HLS_PROTECTION=${{ secrets.NEXT_PUBLIC_ENABLE_HLS_PROTECTION || 'true' }}"
              echo ""
              echo "# Логирование"
              echo "DISABLE_CONSOLE_LOGGING=true"
              echo ""
              echo "# Next.js публичные переменные"
              echo "NEXT_PUBLIC_SITE_URL=https://gafus.ru"
              echo "NEXT_PUBLIC_TRAINER_PANEL_URL=https://trainer.gafus.ru"
              echo ""
              echo "# Инвалидация кэша web при изменении курсов (trainer-panel → web)"
              echo "REVALIDATE_SECRET_TOKEN=${{ secrets.REVALIDATE_SECRET_TOKEN }}"
              echo ""
              echo "# Анализ бандла (только для разработки)"
              echo "ANALYZE=false"
              echo ""
              echo "# CSRF защита"
              echo "CSRF_STRICT=false"
              echo ""
              echo "# Grafana"
              echo "GRAFANA_ADMIN_USER=${{ secrets.GRAFANA_ADMIN_USER }}"
              echo "GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}"
              echo "GRAFANA_SECRET_KEY=${{ secrets.GRAFANA_SECRET_KEY }}"
              echo ""
              echo "# ЮKassa (платные курсы)"
              echo "YOOKASSA_SHOP_ID=${{ secrets.YOOKASSA_SHOP_ID }}"
              echo "YOOKASSA_SECRET_KEY=${{ secrets.YOOKASSA_SECRET_KEY }}"
              echo ""
              echo "# Реквизиты для ЮKassa (контакты на сайте)"
              echo "NEXT_PUBLIC_CONTACT_EMAIL=${{ secrets.NEXT_PUBLIC_CONTACT_EMAIL }}"
              echo "NEXT_PUBLIC_CONTACT_PHONE=${{ secrets.NEXT_PUBLIC_CONTACT_PHONE }}"
              echo "NEXT_PUBLIC_CONTACT_FIO=${{ secrets.NEXT_PUBLIC_CONTACT_FIO }}"
              echo "NEXT_PUBLIC_CONTACT_INN=${{ secrets.NEXT_PUBLIC_CONTACT_INN }}"
              echo ""
              echo "# VK ID авторизация"
              echo "VK_CLIENT_ID=${{ secrets.VK_CLIENT_ID }}"
              echo "VK_WEB_REDIRECT_URI=${{ vars.VK_WEB_REDIRECT_URI || 'https://gafus.ru/api/auth/callback/vk-id' }}"
              echo "VK_MOBILE_REDIRECT_URI=gafus://auth/vk"
            } > ci-cd/docker/.env

            # Set secure permissions for .env file
            chmod 600 ci-cd/docker/.env
            echo "✅ .env file created with secure permissions"

            # Create uploads directories if they don't exist
            mkdir -p packages/public-assets/public/uploads/avatars
            mkdir -p packages/public-assets/public/uploads/pets
            mkdir -p packages/public-assets/public/uploads/courses
            mkdir -p packages/public-assets/public/uploads/shared
            chmod -R 755 packages/public-assets/public/uploads/

            # Создаем бэкап БД на Яндекс.Диск перед остановкой
            ./ci-cd/scripts/backup-to-yandex.sh || echo "⚠️ Бэкап на Яндекс.Диск не удался, продолжаем деплой"

            # Stop existing containers and clean up (сохраняем volumes для БД)
            docker-compose -f ci-cd/docker/docker-compose.prod.yml down --remove-orphans || true
            docker container prune -f
            docker image prune -f

            # Pull latest images from registry in parallel (используем существующие образы)
            echo "📥 Pulling latest Docker images in parallel..."
            pids=""
            docker pull ghcr.io/asmtv1/gafus-web:latest & pids="$pids $!"
            docker pull ghcr.io/asmtv1/gafus-trainer-panel:latest & pids="$pids $!"
            docker pull ghcr.io/asmtv1/gafus-api:latest & pids="$pids $!"
            docker pull ghcr.io/asmtv1/gafus-worker:latest & pids="$pids $!"
            docker pull ghcr.io/asmtv1/gafus-bull-board:latest & pids="$pids $!"
            docker pull ghcr.io/asmtv1/gafus-telegram-bot:latest & pids="$pids $!"
            docker pull ghcr.io/asmtv1/gafus-prisma:latest & pids="$pids $!"
            pull_failed=0
            for pid in $pids; do
              if ! wait $pid; then
                pull_failed=1
              fi
            done
            if [ "$pull_failed" -ne 0 ]; then
              echo "❌ One or more docker pulls failed"
              exit 1
            fi

            # Tag images for local use
            docker tag ghcr.io/asmtv1/gafus-web:latest gafus-web:latest
            docker tag ghcr.io/asmtv1/gafus-trainer-panel:latest trainer-panel:latest
            docker tag ghcr.io/asmtv1/gafus-api:latest gafus-api:latest
            docker tag ghcr.io/asmtv1/gafus-worker:latest gafus-worker:latest
            docker tag ghcr.io/asmtv1/gafus-bull-board:latest gafus-bull-board:latest
            docker tag ghcr.io/asmtv1/gafus-telegram-bot:latest gafus-telegram-bot:latest
            docker tag ghcr.io/asmtv1/gafus-prisma:latest gafus-prisma:latest

            # Start services
            echo "🚀 Starting services..."
            docker-compose -f ci-cd/docker/docker-compose.prod.yml up -d --force-recreate

            # Wait for services to be ready
            sleep 15

            # Run Prisma migrations
            echo "🗄️ Running Prisma migrations..."
            docker-compose -f ci-cd/docker/docker-compose.prod.yml exec -T postgres psql -U gafus -d gafus -c "SELECT 1;" > /dev/null 2>&1 || sleep 5

            # Run migrations using the dedicated Prisma container
            docker-compose -f ci-cd/docker/docker-compose.prod.yml exec -T prisma pnpm run db:migrate:deploy || echo "Migrations failed, continuing..."

            # Check service health
            if docker-compose -f ci-cd/docker/docker-compose.prod.yml ps | grep -q "Up"; then
              echo "✅ Deployment completed successfully!"
              
                          # Clean up unused images and containers
            docker image prune -f
            docker container prune -f
            docker system prune -f
            else
              echo "❌ Deployment failed - services not running"
              exit 1
            fi
