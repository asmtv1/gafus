name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: asmtv1

jobs:
  # Prepare dependencies - shared job for all other jobs
  prepare-deps:
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
      pnpm-cache-key: ${{ steps.pnpm-cache-key.outputs.key }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate cache keys
        id: cache-key
        run: |
          echo "key=${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('packages/**/src/**', 'apps/**/src/**') }}" >> $GITHUB_OUTPUT

      - name: Generate pnpm cache key
        id: pnpm-cache-key
        run: echo "key=${{ hashFiles('**/pnpm-lock.yaml') }}-pnpm-store" >> $GITHUB_OUTPUT

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ steps.pnpm-cache-key.outputs.key }}
          restore-keys: |
            ${{ hashFiles('**/pnpm-lock.yaml') }}-pnpm-store

      - name: Install dependencies with optimizations
        run: |
          # Устанавливаем зависимости с оптимизациями
          pnpm config set store-dir ~/.pnpm-store
          pnpm config set verify-store-integrity false
          pnpm config set auto-install-peers true
          pnpm config set dedupe-peer-dependents false

          # Устанавливаем только production зависимости для CI
          pnpm install --frozen-lockfile --prefer-offline

      - name: Validate dependencies
        run: |
          echo "🔍 Validating dependencies..."
          pnpm list --depth=0 --json > /dev/null || echo "⚠️ Dependency validation failed, but continuing"
          echo "✅ Dependencies validated"

      - name: Generate Prisma Client
        run: |
          cd packages/prisma
          # Temporarily disable prisma-erd-generator in CI to avoid Chromium sandbox issues
          cp schema.prisma schema.prisma.bak
          awk 'BEGIN{skip=0} /^generator erd \{/{skip=1} skip && /^\}/{skip=0; next} !skip {print}' schema.prisma > schema.tmp && mv schema.tmp schema.prisma
          pnpm db:generate
          mv schema.prisma.bak schema.prisma

      - name: Build packages
        run: |
          # logger первым (зависимости: types, queues, cdn-upload, prisma)
          cd packages/logger && pnpm build && cd ../..
          # types, queues, cdn-upload, video-access параллельно (зависят только от logger / без workspace deps)
          (cd packages/types && pnpm build) &
          (cd packages/queues && pnpm build) &
          (cd packages/cdn-upload && pnpm build) &
          (cd packages/video-access && pnpm build) &
          wait
          # prisma (зависит от logger), затем auth, core
          cd packages/prisma && pnpm build && cd ../..
          cd packages/auth && pnpm build && cd ../..
          # mailer до core (TypeScript резолвит dist/index.d.ts у @gafus/mailer)
          cd packages/mailer && pnpm build && cd ../..
          cd packages/core && pnpm build && cd ../..
          # остальные пакеты через turbo
          pnpm build --filter=@gafus/* --filter=!@gafus/prisma --filter=!@gafus/logger --filter=!@gafus/core --filter=!@gafus/types --filter=!@gafus/queues --filter=!@gafus/cdn-upload --filter=!@gafus/auth --filter=!@gafus/video-access --filter=!@gafus/mailer

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/dist
            packages/*/.prisma
            ~/.pnpm-store
          key: ${{ steps.cache-key.outputs.key }}-deps
          restore-keys: |
            ${{ hashFiles('**/pnpm-lock.yaml') }}-deps

  # Security and code quality checks - runs in parallel with build-apps
  security:
    runs-on: ubuntu-latest
    needs: prepare-deps
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/dist
            packages/*/.prisma
            ~/.pnpm-store
          key: ${{ needs.prepare-deps.outputs.cache-key }}-deps

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ needs.prepare-deps.outputs.pnpm-cache-key }}
          restore-keys: |
            ${{ hashFiles('**/pnpm-lock.yaml') }}-pnpm-store

      - name: Install dependencies (optimized)
        run: |
          pnpm config set store-dir ~/.pnpm-store
          pnpm config set verify-store-integrity false
          pnpm config set auto-install-peers true
          pnpm config set dedupe-peer-dependents false

          # Установка с предпочтением кэша, но с возможностью загрузки из сети
          pnpm install --frozen-lockfile --prefer-offline

      - name: Run security audit
        run: pnpm audit --audit-level high || echo "Security audit found issues, but continuing build"

      - name: Run ESLint
        run: |
          cd apps/web
          pnpm lint || echo "ESLint failed, but continuing build"

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: HEAD~1

  # Build and test all apps - runs in parallel with security
  # Turborepo remote cache (30-50% быстрее при повторных сборках):
  # 1. npx turbo login && npx turbo link
  # 2. GitHub: Secrets → TURBO_TOKEN, Variables → TURBO_TEAM
  build-apps:
    runs-on: ubuntu-latest
    needs: prepare-deps
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # нужен для --filter='...[origin/main]'

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/dist
            packages/*/.prisma
            ~/.pnpm-store
          key: ${{ needs.prepare-deps.outputs.cache-key }}-deps

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ needs.prepare-deps.outputs.pnpm-cache-key }}
          restore-keys: |
            ${{ hashFiles('**/pnpm-lock.yaml') }}-pnpm-store

      - name: Install dependencies (optimized)
        run: |
          pnpm config set store-dir ~/.pnpm-store
          pnpm config set verify-store-integrity false
          pnpm config set auto-install-peers true
          pnpm config set dedupe-peer-dependents false

          # Установка с предпочтением кэша, но с возможностью загрузки из сети
          pnpm install --frozen-lockfile --prefer-offline

      - name: Build, test, typecheck apps
        run: |
          # main+push: полная сборка (для деплоя). PR/develop: только изменённые приложения.
          if [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ github.event_name }}" = "push" ]; then
            pnpm turbo run build test typecheck --filter='./apps/web' --filter='./apps/trainer-panel'  --filter='./apps/admin-panel' --filter='./apps/api'
          else
            pnpm turbo run build test typecheck --filter='./apps/*...[origin/main]'
          fi

      - name: Cache app build
        uses: actions/cache@v4
        with:
          path: |
            apps/web/.next
            apps/trainer-panel/.next
            apps/admin-panel/.next
            apps/api/dist
          key: ${{ needs.prepare-deps.outputs.cache-key }}-all-apps-build
          restore-keys: |
            ${{ needs.prepare-deps.outputs.cache-key }}-all-apps-build

  # Build worker packages for Docker - REMOVED (using multi-stage build)
  # Mobile app (apps/mobile) не включён в CI - это Expo приложение для локальной разработки

  # Prepare Docker build context
  prepare-docker:
    needs: [security, build-apps]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      docker-cache-key: ${{ steps.docker-cache-key.outputs.key }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Docker cache key
        id: docker-cache-key
        run: echo "key=${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/Dockerfile*') }}-docker" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Create Docker build cache
        run: |
          # Создаем базовый образ с зависимостями для кэширования
          docker buildx build \
            --platform linux/amd64 \
            --target base \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/gafus-base:latest \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --push \
            -f ci-cd/docker/Dockerfile-web-optimized \
            . || echo "Base image creation failed, continuing with build"

  # Build all Docker images in parallel
  build-images:
    needs: [prepare-docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - { name: "web", file: "Dockerfile-web-optimized", tag: "gafus-web" }
          - {
              name: "trainer-panel",
              file: "Dockerfile-trainer-panel-optimized",
              tag: "gafus-trainer-panel",
            }
          - {
              name: "admin-panel",
              file: "Dockerfile-admin-panel-optimized",
              tag: "gafus-admin-panel",
            }
          - { name: "api", file: "Dockerfile-api-optimized", tag: "gafus-api" }
          - { name: "worker", file: "Dockerfile-worker-optimized", tag: "gafus-worker" }
          - { name: "bull-board", file: "Dockerfile-bull-board-optimized", tag: "gafus-bull-board" }
          - { name: "prisma", file: "Dockerfile-prisma-optimized", tag: "gafus-prisma" }
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push ${{ matrix.image.name }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ci-cd/docker/${{ matrix.image.file }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.image.tag }}:latest
          # web: только GHA cache (без registry) — актуальный код, локальный кэш слоёв
          cache-from: |
            type=gha
            ${{ matrix.image.name != 'web' && format('type=registry,ref={0}/{1}/gafus-base:latest', env.REGISTRY, env.IMAGE_NAME) || '' }}
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  # Deploy to staging (develop branch)
  # Заглушка: staging не реализован — один prod-сервер. Реальный деплой добавить при появлении staging-инфраструктуры.
  deploy-staging:
    needs: [security, build-apps]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to staging
        run: echo "Deploy to staging environment"

  # Deploy to production (main branch)
  deploy-production:
    needs: [security, build-apps, build-images]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.GAFUS_SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 60m
          script: |
            set -e
            echo "🚀 Starting production deployment..."

            # Error handling and graceful shutdown - best practice
            trap 'echo "❌ Deployment failed, cleaning up..."; docker-compose -f ci-cd/docker/docker-compose.prod.yml down --timeout 30 || true; exit 1' ERR
            trap 'echo "🛑 Deployment interrupted, cleaning up..."; docker-compose -f ci-cd/docker/docker-compose.prod.yml down --timeout 30 || true; exit 1' INT TERM

            # Log deployment start
            echo "📅 Deployment started at: $(date)"
            echo "🔧 Server: ${{ secrets.SERVER_HOST }}"
            echo "📦 Docker version: $(docker --version)"
            echo "🐳 Docker Compose version: $(docker-compose --version)"

            # Install basic tools first
            echo "🔧 Installing basic tools..."
            apt-get update
            apt-get install -y curl wget

            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              echo "🐳 Installing Docker..."
              # Use apt for Ubuntu 20.04 (focal)
              apt-get install -y apt-transport-https ca-certificates gnupg lsb-release
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
              echo "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu focal stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
              apt-get update
              apt-get install -y docker-ce docker-ce-cli containerd.io
              systemctl start docker
              systemctl enable docker
            fi

            # Install Docker Compose if not present
            if ! command -v docker-compose &> /dev/null; then
              echo "🐳 Installing Docker Compose..."
              curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              chmod +x /usr/local/bin/docker-compose
            fi

            # Login to GitHub Container Registry
            echo "🔐 Logging in to GitHub Container Registry..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u asmtv1 --password-stdin

            # Navigate to project directory
            cd /root/gafus || {
              echo "Directory /root/gafus not found, creating it..."
              mkdir -p /root/gafus
              cd /root/gafus
            }

            # Initialize git repository if it doesn't exist
            if [ ! -d .git ]; then
              echo "Git repository not found, initializing..."
              git init
              git remote add origin https://${{ secrets.GH_PAT }}@github.com/asmtv1/gafus.git
            fi

            # Ensure we have the correct remote
            git remote set-url origin https://${{ secrets.GH_PAT }}@github.com/asmtv1/gafus.git

            # Pull latest changes (force update to avoid conflicts)
            echo "🔄 Updating repository..."
            if ! git fetch origin; then
              echo "❌ Failed to fetch from origin"
              exit 1
            fi

            if ! git reset --hard origin/main; then
              echo "❌ Failed to reset to origin/main"
              exit 1
            fi

            if ! git clean -fd; then
              echo "❌ Failed to clean working directory"
              exit 1
            fi

            echo "✅ Repository updated successfully"
            echo "📁 Current directory: $(pwd)"
            echo "📋 Git status:"
            git status --porcelain || echo "Git status check failed"
            echo "🔗 Git remote:"
            git remote -v || echo "Git remote check failed"

            # Create .env file from GitHub Secrets
            echo "🔐 Creating .env file from GitHub Secrets..."
            {
              echo "# Database"
              echo "POSTGRES_DB=gafus"
              echo "POSTGRES_USER=gafus"
              echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
              echo "DATABASE_URL=postgresql://gafus:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/gafus"
              echo ""
              echo "# Redis"
              echo "REDIS_URL=redis://redis:6379"
              echo ""
              echo "# NextAuth секреты"
              echo "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}"
              echo ""
              echo "# JWT секреты для API"
              echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
              echo "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}"
              echo ""
              echo "# URLs приложений"
              echo "NEXTAUTH_URL=https://gafus.ru"
              echo "TRAINER_PANEL_URL=https://trainer-panel.gafus.ru"
              echo "NEXT_PUBLIC_TRACER_APP_TOKEN=${{ secrets.NEXT_PUBLIC_TRACER_APP_TOKEN }}"
              echo "NEXT_PUBLIC_APP_VERSION=1.0.0"
              echo "NEXT_PUBLIC_ENABLE_TRACER=true"
              echo "WEB_APP_URL=${{ vars.WEB_APP_URL || 'https://gafus.ru' }}"
              echo ""
              echo "# Cookie домен"
              echo "AUTH_COOKIE_DOMAIN=.gafus.ru"
              echo ""
              echo "# VAPID ключи для Push уведомлений"
              echo "VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }}"
              echo "VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}"
              echo "VAPID_SUBJECT=mailto:admin@gafus.ru"
              echo ""
              echo "# Yandex Cloud CDN"
              echo "YC_ACCESS_KEY_ID=${{ secrets.YC_ACCESS_KEY_ID }}"
              echo "YC_SECRET_ACCESS_KEY=${{ secrets.YC_SECRET_ACCESS_KEY }}"
              echo ""
              echo "# Защита видео (HLS)"
              echo "VIDEO_ACCESS_SECRET=${{ secrets.VIDEO_ACCESS_SECRET }}"
              echo "NEXT_PUBLIC_ENABLE_HLS_PROTECTION=${{ secrets.NEXT_PUBLIC_ENABLE_HLS_PROTECTION || 'true' }}"
              echo ""
              echo "# Логирование"
              echo "DISABLE_CONSOLE_LOGGING=true"
              echo ""
              echo "# Next.js публичные переменные"
              echo "NEXT_PUBLIC_SITE_URL=https://gafus.ru"
              echo "NEXT_PUBLIC_TRAINER_PANEL_URL=https://trainer.gafus.ru"
              echo "NEXT_PUBLIC_APP_URL=https://trainer.gafus.ru"
              echo ""
              echo "# Инвалидация кэша web при изменении курсов (trainer-panel → web)"
              echo "REVALIDATE_SECRET_TOKEN=${{ secrets.REVALIDATE_SECRET_TOKEN }}"
              echo ""
              echo "# Анализ бандла (только для разработки)"
              echo "ANALYZE=false"
              echo ""
              echo "# CSRF защита"
              echo "CSRF_STRICT=false"
              echo ""
              echo "# Yandex Cloud Monitoring"
              echo "YC_MONITORING_WORKSPACE_ID=${{ secrets.YC_MONITORING_WORKSPACE_ID }}"
              echo "YC_MONITORING_API_KEY=${{ secrets.YC_MONITORING_API_KEY }}"
              echo ""
              echo "# OpenRouter AI API"
              echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}"
              echo ""
              echo "# ЮKassa (платные курсы)"
              echo "YOOKASSA_SHOP_ID=${{ secrets.YOOKASSA_SHOP_ID }}"
              echo "YOOKASSA_SECRET_KEY=${{ secrets.YOOKASSA_SECRET_KEY }}"
              echo ""
              echo "# Реквизиты для ЮKassa (контакты на сайте)"
              echo "NEXT_PUBLIC_CONTACT_EMAIL=${{ secrets.NEXT_PUBLIC_CONTACT_EMAIL }}"
              echo "NEXT_PUBLIC_CONTACT_PHONE=${{ secrets.NEXT_PUBLIC_CONTACT_PHONE }}"
              echo "NEXT_PUBLIC_CONTACT_FIO=${{ secrets.NEXT_PUBLIC_CONTACT_FIO }}"
              echo "NEXT_PUBLIC_CONTACT_INN=${{ secrets.NEXT_PUBLIC_CONTACT_INN }}"
              echo ""
              echo "# VK ID авторизация"
              echo "VK_CLIENT_ID=${{ secrets.VK_CLIENT_ID }}"
              echo "VK_CLIENT_ID_IOS=${{ secrets.VK_CLIENT_ID_IOS }}"
              echo "VK_CLIENT_ID_ANDROID=${{ secrets.VK_CLIENT_ID_ANDROID }}"
              echo "VK_WEB_REDIRECT_URI=${{ vars.VK_WEB_REDIRECT_URI || 'https://gafus.ru/api/auth/callback/vk-id' }}"
              echo "VK_MOBILE_REDIRECT_URI=${{ vars.VK_MOBILE_REDIRECT_URI || 'gafus://auth/vk' }}"
              echo ""
              echo "# SMTP / postfix (значения из GitHub Variables → Repository variables)"
              echo "SMTP_HOST=${{ vars.SMTP_HOST || 'postfix' }}"
              echo "SMTP_PORT=${{ vars.SMTP_PORT || '587' }}"
              echo "SMTP_SECURE=${{ vars.SMTP_SECURE || 'false' }}"
              echo "MAIL_FROM=${{ vars.MAIL_FROM || 'noreply@gafus.ru' }}"
              echo "MAIL_FROM_NAME=${{ vars.MAIL_FROM_NAME || 'Гафус' }}"
              echo "MAIL_ALLOWED_SENDER_DOMAINS=${{ vars.MAIL_ALLOWED_SENDER_DOMAINS || 'gafus.ru' }}"
              echo "POSTFIX_MYHOSTNAME=${{ vars.POSTFIX_MYHOSTNAME || 'mail.gafus.ru' }}"
            } > ci-cd/docker/.env

            # Set secure permissions for .env file
            chmod 600 ci-cd/docker/.env
            echo "✅ .env file created with secure permissions"

            # Uploads directories are handled by CDN - no local directories needed

            # Infrastructure cleanup - best practice: remove everything and start fresh
            echo "🧹 Cleaning up infrastructure..."

            # Stop and remove all containers with gafus prefix
            docker stop $(docker ps -q --filter "name=gafus-*") 2>/dev/null || true
            docker rm $(docker ps -aq --filter "name=gafus-*") 2>/dev/null || true

            # Remove all gafus containers by name explicitly
            docker rm -f gafus-web gafus-trainer-panel gafus-admin-panel gafus-api gafus-worker gafus-bull-board gafus-prisma gafus-postgres gafus-redis gafus-postfix gafus-nginx gafus-alloy gafus-node-exporter gafus-postgres-exporter gafus-redis-exporter gafus-blackbox-exporter 2>/dev/null || true

            # Now do the normal compose cleanup
            docker-compose -f ci-cd/docker/docker-compose.prod.yml down --remove-orphans --timeout 30 || true
            docker system prune -f || true
            docker image prune -f --all || true
            docker container prune -f || true
            docker network prune -f || true

            # Remove any dangling images and containers
            docker rmi $(docker images -f "dangling=true" -q) 2>/dev/null || true
            docker rm $(docker ps -aq) 2>/dev/null || true

            # Pull latest images from registry in parallel to speed up deployment
            echo "📥 Pulling latest Docker images in parallel..."

            # Проверяем авторизацию перед загрузкой
            echo "🔍 Verifying registry access..."
            if ! docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/gafus-web:latest 2>&1 | head -5; then
              echo "⚠️ Warning: Failed to pull test image, but continuing..."
            fi

            # Загружаем образы с детальным логированием ошибок
            images=(
              "gafus-web"
              "gafus-trainer-panel"
              "gafus-admin-panel"
              "gafus-api"
              "gafus-worker"
              "gafus-bull-board"
              "gafus-prisma"
            )

            pull_failed=0
            for image in "${images[@]}"; do
              echo "📥 Pulling $image..."
              if ! docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/$image:latest; then
                echo "❌ Failed to pull $image"
                pull_failed=1
              else
                echo "✅ Successfully pulled $image"
              fi
            done

            if [ "$pull_failed" -ne 0 ]; then
              echo "❌ One or more docker pulls failed"
              echo "🔍 Checking registry authentication..."
              docker login ghcr.io -u asmtv1 --password-stdin <<< "${{ secrets.GHCR_TOKEN }}" || echo "⚠️ Login check failed"
              exit 1
            fi

            # Images are now used directly from registry, no need to retag

            # Infrastructure deployment - best practice: start services in dependency order
            echo "🚀 Starting infrastructure services..."

            # 1. Start core infrastructure (database, redis)
            docker-compose -f ci-cd/docker/docker-compose.prod.yml up -d --force-recreate postgres redis postfix
            echo "⏳ Waiting for core services to be ready..."
            sleep 15

            # 2. Start application services
            docker-compose -f ci-cd/docker/docker-compose.prod.yml up -d --force-recreate prisma worker api
            echo "⏳ Waiting for application services to be ready..."
            sleep 10

            # 3. Start web services
            docker-compose -f ci-cd/docker/docker-compose.prod.yml up -d --force-recreate web trainer-panel admin-panel
            echo "⏳ Waiting for web services to be ready..."
            sleep 10

            # 4. Start bull-board (critical for nginx)
            docker-compose -f ci-cd/docker/docker-compose.prod.yml up -d --force-recreate bull-board
            echo "⏳ Waiting for bull-board to be ready..."
            sleep 15

            # Environment Validation - best practice: verify critical environment variables
            echo "🔍 Validating environment variables..."

            # Check bull-board environment variables
            if docker exec gafus-bull-board env | grep -q "REDIS_URL=redis://redis:6379"; then
                echo "✅ REDIS_URL is correctly set in bull-board"
            else
                echo "❌ REDIS_URL is missing or incorrect in bull-board"
                docker exec gafus-bull-board env | grep REDIS_URL || echo "REDIS_URL not found"
                exit 1
            fi

            # Verify bull-board can start without critical errors
            if docker logs gafus-bull-board 2>&1 | grep -q "Error: REDIS_URL is not set"; then
                echo "⚠️ Bull-board has REDIS_URL issues, but continuing..."
                # Don't exit - let the service try to start
            fi

            # 5. Start nginx last (depends on all upstreams)
            docker-compose -f ci-cd/docker/docker-compose.prod.yml up -d --force-recreate nginx
            echo "⏳ Waiting for nginx to be ready..."
            sleep 10

            # 6. Start monitoring and logging services
            echo "📊 Starting monitoring and logging services..."
            docker-compose -f ci-cd/docker/docker-compose.prod.yml up -d --force-recreate \
              grafana-alloy node-exporter postgres-exporter redis-exporter blackbox-exporter
            echo "⏳ Waiting for monitoring services to be ready..."
            sleep 10

            # SSL Certificate Management - best practice: automatic certificate generation
            echo "🔐 Setting up SSL certificates..."

            # Use HTTP-only config for SSL certificate generation
            echo "📋 Switching to HTTP-only config for SSL certificate generation..."
            cp ci-cd/nginx/conf.d/gafus.ru.http-only.conf ci-cd/nginx/conf.d/gafus.ru.conf

            # Restart nginx with HTTP-only config
            docker-compose -f ci-cd/docker/docker-compose.prod.yml restart nginx
            echo "⏳ Waiting for nginx to restart with HTTP-only config..."
            sleep 10

            # Generate SSL certificates using HTTP-only config
            echo "🔐 Generating SSL certificates..."
            docker-compose -f ci-cd/docker/docker-compose.prod.yml run --rm certbot certonly \
                --webroot --webroot-path=/var/www/certbot \
                --email admin@gafus.ru --agree-tos --no-eff-email \
                -d gafus.ru -d www.gafus.ru -d api.gafus.ru \
                -d trainer-panel.gafus.ru -d monitor.gafus.ru -d adminka.gafus.ru -d queues.gafus.ru || true

            # Switch back to HTTPS config
            echo "🔄 Switching back to HTTPS config..."
            git checkout ci-cd/nginx/conf.d/gafus.ru.conf

            # Restart nginx with HTTPS config
            docker-compose -f ci-cd/docker/docker-compose.prod.yml restart nginx
            echo "⏳ Waiting for nginx to be ready with SSL..."
            sleep 15

            # Run Prisma migrations
            echo "🗄️ Running Prisma migrations..."
            docker-compose -f ci-cd/docker/docker-compose.prod.yml exec -T postgres psql -U gafus -d gafus -c "SELECT 1;" > /dev/null 2>&1 || sleep 5

            # Run migrations using the dedicated Prisma container
            docker-compose -f ci-cd/docker/docker-compose.prod.yml exec -T prisma pnpm run db:migrate:deploy || echo "Migrations failed, continuing..."

            # Database seeds are run manually when needed
            # docker-compose -f ci-cd/docker/docker-compose.prod.yml exec -T prisma pnpm run db:seed || echo "Seeds failed or not available, continuing..."

                        # Health checks temporarily disabled - will be re-enabled later
            echo "🏥 Health checks temporarily disabled for deployment stability"
            echo "🎉 Deployment completed! Services are starting up..."

            # Final cleanup
            docker image prune -f
            docker system prune -f

  # Health check removed - will be handled by separate monitoring workflow
