services:
  # Database
  postgres:
    image: postgres:15-alpine
    container_name: gafus-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-gafus}
      - POSTGRES_USER=${POSTGRES_USER:-gafus}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Убрали открытые порты - доступ только внутри Docker сети
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gafus -d gafus"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis
  redis:
    image: redis:7-alpine
    container_name: gafus-redis
    # Убрали открытые порты - доступ только внутри Docker сети
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Исходящая почта (транзакционные письма): только внутри Docker, порт 587 не публикуем наружу.
  # Образ: https://github.com/bokysan/docker-postfix — OpenDKIM встроен.
  # DKIM: после первого старта взять TXT для DNS: docker exec gafus-postfix find /etc/opendkim/keys -name '*.txt' -exec cat {} \;
  # В панели DNS: имя mail._domainkey (селектор mail), тип TXT, значение из файла целиком.
  postfix:
    image: boky/postfix:v5.0.0
    container_name: gafus-postfix
    environment:
      ALLOWED_SENDER_DOMAINS: ${MAIL_ALLOWED_SENDER_DOMAINS:-gafus.ru}
      POSTFIX_myhostname: ${POSTFIX_MYHOSTNAME:-mail.gafus.ru}
      # Ключи один раз генерируются образом и хранятся в томе; без тома при каждом recreate будет новый ключ → сломает DNS.
      DKIM_AUTOGENERATE: "true"
      DKIM_SELECTOR: mail
    volumes:
      - postfix_opendkim_keys:/etc/opendkim/keys
    expose:
      - "587"
    restart: unless-stopped

  # Web Application
  web:
    image: ghcr.io/asmtv1/gafus-web:latest
    container_name: gafus-web
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DISABLE_CONSOLE_LOGGING=${DISABLE_CONSOLE_LOGGING:-false}
      - ANALYZE=${ANALYZE:-false}
      - CSRF_STRICT=${CSRF_STRICT:-false}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - AUTH_COOKIE_DOMAIN=${AUTH_COOKIE_DOMAIN}
      - AUTH_TRUST_HOST=true
      - APPLE_TEAM_ID=${APPLE_TEAM_ID}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - NEXT_PUBLIC_TRAINER_PANEL_URL=${NEXT_PUBLIC_TRAINER_PANEL_URL}
      - NEXT_PUBLIC_TRACER_APP_TOKEN=${NEXT_PUBLIC_TRACER_APP_TOKEN}
      - TRACER_APP_TOKEN=${TRACER_APP_TOKEN:-${NEXT_PUBLIC_TRACER_APP_TOKEN}}
      - TRACER_SERVER_ENABLED=${TRACER_SERVER_ENABLED:-}
      - NEXT_PUBLIC_APP_VERSION=${NEXT_PUBLIC_APP_VERSION:-1.0.0}
      - NEXT_PUBLIC_ENABLE_TRACER=${NEXT_PUBLIC_ENABLE_TRACER:-true}
      - REVALIDATE_SECRET_TOKEN=${REVALIDATE_SECRET_TOKEN}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:admin@gafus.ru}
      # Yandex Cloud CDN credentials
      - YC_ACCESS_KEY_ID=${YC_ACCESS_KEY_ID}
      - YC_SECRET_ACCESS_KEY=${YC_SECRET_ACCESS_KEY}
      # HLS Video Protection
      - VIDEO_ACCESS_SECRET=${VIDEO_ACCESS_SECRET}
      - NEXT_PUBLIC_ENABLE_HLS_PROTECTION=${NEXT_PUBLIC_ENABLE_HLS_PROTECTION:-true}
      # ЮKassa (платные курсы, API route в web)
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY}
      # Реквизиты для страницы контактов
      - NEXT_PUBLIC_CONTACT_EMAIL=${NEXT_PUBLIC_CONTACT_EMAIL}
      - NEXT_PUBLIC_CONTACT_PHONE=${NEXT_PUBLIC_CONTACT_PHONE}
      - NEXT_PUBLIC_CONTACT_FIO=${NEXT_PUBLIC_CONTACT_FIO}
      - NEXT_PUBLIC_CONTACT_INN=${NEXT_PUBLIC_CONTACT_INN}
      # VK ID
      - VK_CLIENT_ID=${VK_CLIENT_ID}
      - VK_WEB_REDIRECT_URI=${VK_WEB_REDIRECT_URI}
      - WEB_APP_URL=${WEB_APP_URL:-https://gafus.ru}
      # SMTP → контейнер postfix (транзакционная почта)
      - SMTP_HOST=${SMTP_HOST:-postfix}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - MAIL_FROM=${MAIL_FROM:-noreply@gafus.ru}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-}
    # Uploads handled by CDN - no local volume needed
    # Убрали открытые порты - доступ только через Nginx
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://web:3000/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    depends_on:
      - postgres
      - redis
      - postfix

  # Trainer Panel
  trainer-panel:
    image: ghcr.io/asmtv1/gafus-trainer-panel:latest
    container_name: gafus-trainer-panel
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DISABLE_CONSOLE_LOGGING=${DISABLE_CONSOLE_LOGGING:-false}
      - CSRF_STRICT=${CSRF_STRICT:-false}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${TRAINER_PANEL_URL:-https://trainer-panel.gafus.ru}
      - AUTH_COOKIE_DOMAIN=${AUTH_COOKIE_DOMAIN:-.gafus.ru}
      # Yandex Cloud CDN credentials
      - YC_ACCESS_KEY_ID=${YC_ACCESS_KEY_ID}
      - YC_SECRET_ACCESS_KEY=${YC_SECRET_ACCESS_KEY}
      # HLS Video Protection
      - VIDEO_ACCESS_SECRET=${VIDEO_ACCESS_SECRET}
      - NEXT_PUBLIC_ENABLE_HLS_PROTECTION=${NEXT_PUBLIC_ENABLE_HLS_PROTECTION:-true}
      # OpenRouter AI API
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      # Next.js публичные переменные и инвалидация кэша web
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_TRAINER_PANEL_URL:-https://trainer.gafus.ru}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - WEB_APP_URL=${WEB_APP_URL:-https://gafus.ru}
      - REVALIDATE_SECRET_TOKEN=${REVALIDATE_SECRET_TOKEN}
      - NEXT_PUBLIC_TRACER_APP_TOKEN=${NEXT_PUBLIC_TRACER_APP_TOKEN}
      - TRACER_APP_TOKEN=${TRACER_APP_TOKEN:-${NEXT_PUBLIC_TRACER_APP_TOKEN}}
      - TRACER_SERVER_ENABLED=${TRACER_SERVER_ENABLED:-}
      - NEXT_PUBLIC_APP_VERSION=${NEXT_PUBLIC_APP_VERSION:-1.0.0}
      - NEXT_PUBLIC_ENABLE_TRACER=${NEXT_PUBLIC_ENABLE_TRACER:-true}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://trainer-panel:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    depends_on:
      - postgres
      - redis

  # Admin Panel
  admin-panel:
    image: ghcr.io/asmtv1/gafus-admin-panel:latest
    container_name: gafus-admin-panel
    environment:
      - NODE_ENV=production
      - PORT=3006
      - DISABLE_CONSOLE_LOGGING=${DISABLE_CONSOLE_LOGGING:-false}
      - CSRF_STRICT=${CSRF_STRICT:-false}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${ADMIN_PANEL_URL:-https://adminka.gafus.ru}
      - AUTH_COOKIE_DOMAIN=${AUTH_COOKIE_DOMAIN:-.gafus.ru}
      - TRACER_APP_TOKEN=${TRACER_APP_TOKEN:-${NEXT_PUBLIC_TRACER_APP_TOKEN}}
      - TRACER_SERVER_ENABLED=${TRACER_SERVER_ENABLED:-}
      - NEXT_PUBLIC_TRACER_APP_TOKEN=${NEXT_PUBLIC_TRACER_APP_TOKEN}
    # Убрали открытые порты - доступ только через Nginx
    restart: unless-stopped
    depends_on:
      - postgres
      - redis

  # Prisma Database Management
  prisma:
    image: ghcr.io/asmtv1/gafus-prisma:latest
    container_name: gafus-prisma
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped
    depends_on:
      - postgres

  # Worker
  worker:
    image: ghcr.io/asmtv1/gafus-worker:latest
    container_name: gafus-worker
    environment:
      - NODE_ENV=production
      - WORKER_HEALTH_PORT=3003
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:admin@gafus.ru}
      # Yandex Cloud CDN credentials (необходимы для транскодирования видео)
      - YC_ACCESS_KEY_ID=${YC_ACCESS_KEY_ID}
      - YC_SECRET_ACCESS_KEY=${YC_SECRET_ACCESS_KEY}
      # Включаем транспорты для гарантированной записи логов в stdout
      - PINO_USE_WORKER_TRANSPORTS=true
      - TRACER_APP_TOKEN=${TRACER_APP_TOKEN:-${NEXT_PUBLIC_TRACER_APP_TOKEN}}
      - TRACER_SERVER_ENABLED=${TRACER_SERVER_ENABLED:-}
      # SMTP — как у api/web (фоновые задачи с @gafus/mailer / почтой)
      - SMTP_HOST=${SMTP_HOST:-postfix}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - MAIL_FROM=${MAIL_FROM:-noreply@gafus.ru}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-}
    deploy:
      resources:
        limits:
          cpus: "0.8" # Максимум 0.8 CPU ядра (на сервере только 1 CPU)
          memory: 2G # Максимум 2GB памяти
        reservations:
          cpus: "0.2" # Минимум 0.2 CPU ядра
          memory: 512M # Минимум 512MB памяти
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - postgres
      - redis
      - postfix

  # Bull Board
  bull-board:
    image: ghcr.io/asmtv1/gafus-bull-board:latest
    container_name: gafus-bull-board
    environment:
      - NODE_ENV=production
      - PORT=3002
      - REDIS_URL=redis://redis:6379
      - TRACER_APP_TOKEN=${TRACER_APP_TOKEN:-${NEXT_PUBLIC_TRACER_APP_TOKEN}}
      - TRACER_SERVER_ENABLED=${TRACER_SERVER_ENABLED:-}
    # Убрали открытые порты - доступ только через Nginx
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy

  # API Service
  api:
    image: ghcr.io/asmtv1/gafus-api:latest
    container_name: gafus-api
    environment:
      - NODE_ENV=production
      - API_PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      # ЮKassa (платежи через API)
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY}
      # База web URL для return_url платежей
      - WEB_APP_URL=${WEB_APP_URL}
      # HLS Video Protection
      - VIDEO_ACCESS_SECRET=${VIDEO_ACCESS_SECRET}
      - TRACER_APP_TOKEN=${TRACER_APP_TOKEN:-${NEXT_PUBLIC_TRACER_APP_TOKEN}}
      - TRACER_SERVER_ENABLED=${TRACER_SERVER_ENABLED:-}
      # Yandex Cloud Object Storage (для загрузки манифестов и сегментов)
      - YC_ACCESS_KEY_ID=${YC_ACCESS_KEY_ID}
      - YC_SECRET_ACCESS_KEY=${YC_SECRET_ACCESS_KEY}
      # VK ID (mobile auth, vk-link)
      - VK_CLIENT_ID=${VK_CLIENT_ID}
      - VK_CLIENT_ID_IOS=${VK_CLIENT_ID_IOS}
      - VK_CLIENT_ID_ANDROID=${VK_CLIENT_ID_ANDROID}
      - VK_MOBILE_REDIRECT_URI=${VK_MOBILE_REDIRECT_URI:-gafus://auth/vk}
      - SMTP_HOST=${SMTP_HOST:-postfix}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - MAIL_FROM=${MAIL_FROM:-noreply@gafus.ru}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      postfix:
        condition: service_started

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: gafus-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    command: >
      sh -c "
        echo 'Starting nginx with CDN configuration...' &&
        nginx -g 'daemon off;'
      "
    restart: unless-stopped
    depends_on:
      - web
      - trainer-panel
      - admin-panel
      - api
      - bull-board

  # Certbot for SSL certificates
  certbot:
    image: certbot/certbot
    container_name: gafus-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    command: certonly --webroot --webroot-path=/var/www/certbot --email admin@gafus.ru --agree-tos --no-eff-email -d gafus.ru -d www.gafus.ru -d api.gafus.ru -d trainer-panel.gafus.ru -d adminka.gafus.ru -d queues.gafus.ru
    depends_on:
      - nginx

  # Node Exporter
  node-exporter:
    image: prom/node-exporter:latest
    container_name: gafus-node-exporter
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    network_mode: host
    restart: unless-stopped
    pid: host

  # PostgreSQL Exporter
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: gafus-postgres-exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-gafus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gafus}?sslmode=disable
    restart: unless-stopped
    depends_on:
      - postgres

  # Redis Exporter
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: gafus-redis-exporter
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    restart: unless-stopped
    depends_on:
      - redis

  # Blackbox Exporter для проверки HTTP endpoints (health checks)
  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: gafus-blackbox-exporter
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"
    volumes:
      - ./blackbox:/etc/blackbox_exporter
    restart: unless-stopped

  # Grafana Alloy — сбор метрик и remote_write в Yandex Monitoring
  grafana-alloy:
    image: grafana/alloy:v1.8.2
    container_name: gafus-alloy
    command: ["run", "/etc/alloy/config.alloy"]
    volumes:
      - ./prometheus:/etc/alloy:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - YC_MONITORING_API_KEY=${YC_MONITORING_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:12345/-/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      - node-exporter
      - postgres-exporter
      - blackbox-exporter

volumes:
  postgres_data:
  postfix_opendkim_keys:
